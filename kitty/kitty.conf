include hyde.conf

font_size 11.0

# BEGIN_KITTY_FONTS
font_family      family="SauceCodePro Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
active_tab_font_style   bold
inactive_tab_font_style normal

enable_audio_bell no

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4

map alt+[ previous_tab
map alt+] next_tab

enabled_layouts splits,tall,fat,grid

map alt+d launch --location=vsplit
map alt+shift+d launch --location=hsplit

map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

map alt+t new_tab
map alt+w no_op
map alt+x close_window

window_border_width 1.5pt
active_border_color #b4befe
inactive_border_color #313244
