font_family      SauceCodePro Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

macos_thicken_font 0.2

background_opacity 0.85

background_blur 30

window_padding_width 10 15

hide_window_decorations titlebar-only

mouse_hide_wait 3.0

tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
active_tab_font_style   bold
inactive_tab_font_style normal

enable_audio_bell no
input_delay 1
sync_to_monitor yes

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4

map cmd+[ previous_tab
map cmd+] next_tab

remember_window_size no

resize_in_steps no

macos_window_tabs no

enabled_layouts splits,tall,fat,grid

map cmd+d launch --location=vsplit
map cmd+shift+d launch --location=hsplit

map cmd+left neighboring_window left
map cmd+right neighboring_window right
map cmd+up neighboring_window up
map cmd+down neighboring_window down

window_border_width 1.5pt
active_border_color #b4befe
inactive_border_color #313244
