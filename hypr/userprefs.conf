# Set your personal hyprland configuration here
# See https://wiki.hypr.land/Configuring for more information

# // █ █▄░█ █▀█ █░█ ▀█▀
# // █ █░▀█ █▀▀ █▄█ ░█░


bind = $mainMod SHIFT, O, movecurrentworkspacetomonitor, +1

exec-once = fcitx5 -d
exec-once = rclone mount gdrive: ~/GoogleDrive --vfs-cache-mode full --daemon
exec-once = [workspace 1 silent] kitty
exec-once = [workspace 2 silent] firefox
exec-once = [workspace 3 silent] notion-app
exec-once = [workspace 10 silent] slack

# window rule
windowrule {
    name = float_dolphin
    
    match:class = ^(org\.kde\.dolphin)$
    
    float = on
    center = on
}

# HDR
env = PROTON_ENABLE_WAYLAND,1
env = PROTON_ENABLE_HDR,1
env = DXVK_HDR,1
env = ENABLE_HDR_WSI,1

#  Uncomment to enable // change to a preferred value
# 🔗 See https://wiki.hypr.land/Configuring/Variables/#input
input {
    # kb_layout = us
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat
    # numlock_by_default = true
    kb_options = caps:escape

    # 🔗 See https://wiki.hypr.land/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }

}



# 🔗 See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}


